name: Build

on:
  push:
  pull_request:

jobs:
  Android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android Build
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            export
            ~/.gradle/caches
            ~/.android/build-cache
          key: android-${{ runner.os }}-${{ hashFiles('**/Project.xml') }}

      - name: Install Android Dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager \
            "platform-tools" \
            "platforms;android-30" \
            "build-tools;30.0.3" \
            "ndk;21.4.7075529" \
            "cmake;3.18.1"

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install flixel-addons --quiet
          haxelib install hxcpp --quiet

      - name: Run Setup
        shell: bash
        run: |
          haxelib run lime setup

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT /usr/local/lib/android/sdk/ndk/21.4.7075529
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile Android
        run: |
          haxelib run lime build android

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-android
          path: export/android/bin/app/build/outputs/apk/
          if-no-files-found: error

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\haxelib
            export
          key: windows-${{ runner.os }}-${{ hashFiles('**/Project.xml') }}

      - name: Install Libraries
        shell: bash
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-addons --quiet
          haxelib install flixel-tools --quiet

      - name: Run Setup
        shell: bash
        run: |
          haxelib run lime setup

      - name: Build Windows
        shell: bash
        run: |
          haxelib run lime build windows

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-windows
          path: export/windows/bin/
