name: Build Haxe Project

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        shell: bash
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet

      - name: Run Lime Setup
        shell: bash
        run: |
          haxelib run lime setup

      - name: Build Project
        shell: bash
        run: |
          haxelib run lime build windows

      - name: Bruh Nothing
        run: echo "bruh"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-windows
          path: export/windows/bin/

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet

      - name: Run Lime Setup
        run: |
          haxelib run lime setup

      - name: Build Project
        run: |
          haxelib run lime build linux

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-linux
          path: export/linux/bin/
          
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang++ \
            gcc \
            g++ \
            libc6-dev \
            libstdc++-12-dev \
            zlib1g-dev

      - name: Install Libraries
        run: |
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install flixel-tools --quiet
          haxelib install hxcpp --quiet

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android Environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Lime Android Config
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_ROOT
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Rebuild HXCPP
        run: |
          haxelib run hxcpp rebuild

      - name: Build Android APK
        env:
          CXXFLAGS: "-stdlib=libstdc++"
          CPPFLAGS: "-stdlib=libstdc++"
        run: |
          haxelib run lime build android -verbose

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strident-Crisis-Shader-generator-android
          path: export/android/bin/app/build/outputs/apk/debug/*.apk
